services:
  postgres:
    image: postgres:16-alpine
    container_name: colab-challenge-postgres
    environment:
      POSTGRES_USER: colab-challenge
      POSTGRES_PASSWORD: colab-challenge
      POSTGRES_DB: colab-challenge
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U colab-challenge -d colab-challenge"]
      interval: 5s
      timeout: 3s
      retries: 10

  backend:
    build:
      context: .
      dockerfile: apps/backend/Dockerfile
    container_name: colab-challenge-backend
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PORT: 3001
      DATABASE_URL: postgresql://colab-challenge:colab-challenge@postgres:5432/colab-challenge
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
    ports:
      - "3001:3001"
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: apps/frontend/Dockerfile
    container_name: colab-challenge-frontend
    depends_on:
      - backend
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:3001
    ports:
      - "3000:3000"
    restart: unless-stopped

volumes:
  postgres_data:
